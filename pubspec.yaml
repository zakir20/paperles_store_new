name: paperless_store
description: A new Flutter project.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  http: ^1.1.0
  shared_preferences: ^2.2.2
  path_provider: ^2.1.0
  image_picker: ^1.0.4
  get: ^4.6.5
  get_storage: ^2.1.1
  gap: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  
  # ASSETS SECTION
  assets:
    - assets/images/
    - assets/locales/  # Add this for translation files
  
  # FONTS SECTION (for Bangla font)
  fonts:
    - family: Kalpurush
      fonts:
        - asset: assets/fonts/Kalpurush.ttf
    # - family: SolaimanLipi
    #   fonts:
    #     - asset: assets/fonts/SolaimanLipi.ttf
  
  # GENERATE SECTION (for localization)
  generate: true